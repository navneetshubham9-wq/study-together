<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STUDY NEST</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>📚 STUDY NEST</h1>
    <h2>Collaborate, Learn, and Grow Together</h2>
  </header>

  <main>
    <!-- Join Section -->
    <section id="join-section">
      <input type="text" id="username" placeholder="Enter Your Name">
      <input type="text" id="room" placeholder="Enter Room ID">
      <button id="joinBtn">Join Room</button>
    </section>

    <!-- Controls (hidden initially) -->
    <section id="controls" class="hidden">
      <button id="muteBtn">Mute</button>
      <button id="cameraBtn">Camera Off</button>
      <button id="shareBtn">Share Screen</button>
      <button id="leaveBtn">Leave Room</button>
      <button id="muteAllBtn">Mute All Users</button>
    </section>

    <!-- Video Area -->
    <section id="videos" style="width:600px; height:400px; background:#000; margin:auto; border:2px solid #6a11cb; border-radius:8px;">
      <!-- Local video will appear here -->
    </section>

    <!-- Chat (hidden initially) -->
    <section id="chat-container" class="hidden">
      <div id="messages"></div>
      <div id="chat-input">
        <input type="text" id="messageInput" placeholder="Type message">
        <button id="sendBtn">Send</button>
        <input type="file" id="fileInput" accept=".pdf,image/*">
        <button id="sendFileBtn">Share Document</button>
      </div>
      <div id="downloadLink"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>Made with ❤️ for collaborative learning</p>
    <p>© 2026 STUDY NEST. All rights reserved.</p>
    <p>Contact: navneetshubham9@gmail.com, 8839339013</p>
  </footer>

  <!-- Agora SDK -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <!-- Main Script -->
  <script type="module">
    const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

    let joined = false;
    let localAudioTrack, localVideoTrack;

    // Join Room
    document.getElementById('joinBtn').addEventListener('click', async () => {
      if (joined) {
        alert("Already joined the room!");
        return;
      }

      const roomId = document.getElementById('room').value.trim();
      const userName = document.getElementById('username').value.trim();

      if (!roomId || !userName) {
        alert("Please enter both Name and Room ID!");
        return;
      }

      try {
        const appId = "3fd771b87f804bc59f50e485662afaa7"; // ✅ तुम्हारा App ID
        const token = null; // अगर certificate enable नहीं है
        const uid = userName;

        await client.join(appId, roomId, token, uid);

        // ✅ Mic और Camera track बनाओ
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        localVideoTrack = await AgoraRTC.createCameraVideoTrack();

        // ✅ Publish करो
        await client.publish([localAudioTrack, localVideoTrack]);

        // ✅ Video को UI में दिखाओ
        const videoContainer = document.getElementById('videos');
        videoContainer.innerHTML = ""; 
        localVideoTrack.play(videoContainer);

        joined = true;

        // UI दिखाओ
        document.getElementById('controls').classList.remove('hidden');
        document.getElementById('chat-container').classList.remove('hidden');
        document.getElementById('controls').classList.add('fade-in');
        document.getElementById('chat-container').classList.add('fade-in');

      } catch (err) {
        alert("Failed to join room: " + err);
      }
    });

    // Leave Room
    document.getElementById('leaveBtn').addEventListener('click', async () => {
      try {
        if (localAudioTrack) localAudioTrack.close();
        if (localVideoTrack) localVideoTrack.close();

        await client.leave();
        joined = false;

        document.getElementById('controls').classList.add('hidden');
        document.getElementById('chat-container').classList.add('hidden');
        document.getElementById('videos').innerHTML = "";

        alert("You have left the room.");
      } catch (err) {
        alert("Error leaving room: " + err);
      }
    });
  </script>
</body>
</html>
