<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📚 STUDY NEST</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
      color: #333;
      text-align: center;
    }
    header {
      padding: 20px;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    h2 {
      margin: 5px 0 0;
      font-weight: normal;
      font-size: 1.2rem;
    }
    #join-section, #controls {
      margin: 30px auto;
      padding: 20px;
      background: rgba(255,255,255,0.9);
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    input, button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    footer {
      margin-top: 40px;
      padding: 10px;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <header>
    <h1>📚 STUDY NEST</h1>
    <h2>Collaborate, Learn, and Grow Together</h2>
  </header>

  <main>
    <!-- User & Room Inputs -->
    <section id="join-section">
      <input type="text" id="username" placeholder="Enter Your Name" aria-label="Username">
      <input type="text" id="room" placeholder="Enter Room ID" aria-label="Room ID">
      <button id="joinBtn">Join Room</button>
    </section>

    <!-- Controls -->
    <section id="controls">
      <button id="muteBtn">Mute</button>
      <button id="c">Camera</button>
    </section>
  </main>

  <footer>
    <p>Contact: navneetshubham9@gmail.com</p>
  </footer>

  <!-- Agora SDK -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <!-- Main Script -->
  <script type="module" src="script.js"></script>
</body>
</html>
