<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STUDY NEST</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>📚 STUDY NEST</h1>
    <h2>Collaborate, Learn, and Grow Together</h2>
  </header>

  <main>
    <!-- Join Section -->
    <section id="join-section">
      <input type="text" id="username" placeholder="Enter Your Name" aria-label="Username">
      <input type="text" id="room" placeholder="Enter Room ID" aria-label="Room ID">
      <button id="joinBtn">Join Room</button>
    </section>

    <!-- Controls (hidden initially) -->
    <section id="controls">
      <button id="muteBtn">Mute</button>
      <button id="cameraBtn">Camera Off</button>
      <button id="shareBtn">Share Screen</button>
      <button id="leaveBtn">Leave Room</button>
      <button id="muteAllBtn">Mute All Users</button>
    </section>

    <!-- Video Area -->
    <section id="videos"></section>

    <!-- Chat (hidden initially) -->
    <section id="chat-container">
      <div id="messages" aria-live="polite"></div>
      <div id="chat-input">
        <input type="text" id="messageInput" placeholder="Type message" aria-label="Chat message">
        <button id="sendBtn">Send</button>
        <input type="file" id="fileInput" accept=".pdf,image/*">
        <button id="sendFileBtn">Share Document</button>
      </div>
      <div id="downloadLink"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>Made with ❤️ for collaborative learning</p>
    <p>© 2026 STUDY NEST. All rights reserved.</p>
    <p>Contact: navneetshubham9@gmail.com, 8839339013</p>
  </footer>

  <!-- Agora SDK -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <!-- Main Script -->
  <script type="module">
    // File upload handling
    document.getElementById('sendFileBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('fileInput');
      if (!fileInput.files.length) {
        alert('Please select a file first!');
        return;
      }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      try {
        const res = await fetch('/upload', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        document.getElementById('downloadLink').innerHTML =
          `<a href="${data.downloadLink}" target="_blank">Download File</a>`;
      } catch (err) {
        document.getElementById('downloadLink').innerText = 'Upload failed!';
      }
    });

    // Show controls + chat after joining room
    document.getElementById('joinBtn').addEventListener('click', () => {
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('chat-container').style.display = 'block';
    });
  </script>
</body>
</html>
