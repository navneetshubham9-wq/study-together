<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STUDY NEST</title>

   <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📚 STUDY NEST</h1>
    <h2>Collaborate, Learn, and Grow Together</h2>
  </header>

  <main>
    <!-- User & Room Inputs -->
    <section id="join-section">
      <input type="text" id="username" placeholder="Enter Your Name" aria-label="Username">
      <input type="text" id="room" placeholder="Enter Room ID" aria-label="Room ID">
      <button id="joinBtn">Join Room</button>
    </section>

    <!-- Controls -->
    <section id="controls">
      <button id="muteBtn">Mute</button>
      <button id="cameraBtn">Camera Off</button>
      <button id="shareBtn">Share Screen</button>
      <button id="leaveBtn">Leave Room</button>
      <button id="muteAllBtn">Mute All Users</button>
    </section>

    <!-- Video Area -->
    <section id="videos"></section>

    <!-- Chat Area -->
    <section id="chat-container">
      <div id="messages" aria-live="polite"></div>
      <div id="chat-input">
        <input type="text" id="messageInput" placeholder="Type message" aria-label="Chat message">
        <input type="file" id="fileInput" accept=".pdf,image/*">
        <button id="sendBtn">Send</button>
        <button id="sendFileBtn">Share Document</button>
      </div>
    </section>
  </main>

  <footer>
    <p>Made with ❤️ for collaborative learning</p>
    <P>© 2026 STUDY NEST. All rights reserved.</P>
    <P>Contact:navneetshubham9@gmail.com</P>
  </footer>

  <!-- Agora SDK -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <!-- Main Script -->
  <script type="module" src="script.js"></script>
</body>
</html>
