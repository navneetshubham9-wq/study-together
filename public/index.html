<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>📚 Study Nest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <div id="notification-container"></div>

  <header>
    <h1>📚 STUDY NEST</h1>
    <h2>Collaborate, Learn, and Grow Together</h2>
  </header>

  <main>
    <section id="join-section" class="card">
      <input id="username" placeholder="Enter Your Name" />
      <input id="room" placeholder="Enter Room ID" />
      <button id="joinBtn">Join Room</button>
    </section>

    <div id="workspace" class="hidden">
      
      <audio id="remoteMusicPlayer" style="display: none;" crossorigin="anonymous"></audio>

      <section id="controls" class="card entry-animation delay-controls">
        <div class="control-row">
          <button id="cameraBtn">Camera Off</button>
          <button id="muteBtn">Mute</button>
          <button id="shareBtn">Screen Share</button>
          <button id="leaveBtn" style="background-color: #e74c3c; color: white;">Leave Room</button>
          
          <button id="muteAllBtn" style="background-color: #e74c3c; color: white; display: none;">Mute All (Host)</button>
          <button id="unmuteAllBtn" style="background-color: #4CAF50; color: white; display: none;">Unmute All (Host)</button>
        </div>

        <div id="hostAudioContainer" style="display: none; width: 100%; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
          <p style="margin: 0 0 10px 0; font-weight: 500; font-size: 14px; text-align: center; color: var(--accent);">🎵 Host Music Player (Live Stream)</p>
          <div style="display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap;">
            <input type="file" id="hostAudioFile" accept="audio/*" style="padding: 8px; background: rgba(0,0,0,0.2); border: var(--3d-border); border-radius: 6px; color: #fff; font-size: 13px; max-width: 250px;" />
            <audio id="hostAudioPlayer" controls style="height: 38px; border-radius: 6px; outline: none;"></audio>
          </div>
        </div>
      </section>

      <section id="video-area" class="card video-grid entry-animation delay-video"></section>

      <section id="chat-box" class="card entry-animation delay-chat">
        <h3>💬 Live Chat</h3>
        <div id="messages" class="messages"></div>
        <div class="chat-input">
          <input id="chatInput" placeholder="Type a message..." />
          <button id="sendMsg">Send</button>
        </div>
      </section>

      <section id="file-box" class="card entry-animation delay-files">
        <h3>📂 Shared Files</h3>
        <div id="fileList" class="file-box-list"></div>
        <div class="file-upload-footer">
          <input type="file" id="fileUpload" accept=".jpg,.jpeg,.pdf" style="display: none;" />
          <button id="customUploadBtn" onclick="document.getElementById('fileUpload').click()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); flex: 1;">Choose File</button>
          <button id="uploadBtn" style="background-color: var(--primary);">Upload</button>
        </div>
      </section>

      <section id="whiteboard-box" class="card entry-animation delay-files" style="grid-column: 1 / -1; height: 550px;">
        <h3>🎨 Interactive Whiteboard <span id="wb-status" style="font-size:12px; color:var(--accent); font-weight:400; margin-left: 10px;">(View Only)</span></h3>
        <div id="whiteboard-container" style="position: relative; width: 100%; height: 450px; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #ccc;">
          <canvas id="whiteboard" style="width: 100%; height: 100%; cursor: not-allowed; display: block;"></canvas>
          
          <div id="wb-toolbar" style="display: none; position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 30px; gap: 15px; align-items: center; z-index: 20; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
            <input type="color" id="wb-color" value="#000000" style="cursor: pointer; width: 30px; height: 30px; border: 2px solid white; border-radius: 50%; padding:0; background:transparent;" title="Choose Color">
            <input type="range" id="wb-size" min="1" max="20" value="3" style="width: 100px; cursor: pointer;" title="Brush Size">
            <button id="wb-eraser" class="icon-btn" style="font-size: 16px; padding: 5px 10px;" title="Eraser">🧽</button>
            <button id="wb-clear" class="icon-btn" style="background: var(--danger); font-size: 16px; padding: 5px 10px;" title="Clear Board">🗑️</button>
          </div>
        </div>
      </section>

    </div> 
  </main>

  <footer>
    <p>Contact: navneetshubham9@gmail.com</p>
  </footer>

  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
